name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm install

      - name: Build
        run: |
          mkdir -p _site/node_modules/reveal.js
          cp index.html _site/
          cp -r node_modules/reveal.js/dist _site/node_modules/reveal.js/dist
          touch _site/.nojekyll

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
